
CONFIG_GPIO=y
# ===== 串口 =====
CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_PRINTK=y

# ===== SPI =====
CONFIG_SPI=y
CONFIG_MAIN_STACK_SIZE=4096


# ===== 显示 =====
CONFIG_DISPLAY=y
CONFIG_DISPLAY_LOG_LEVEL_INF=y

# ===== MIPI DBI =====
CONFIG_MIPI_DBI=y

# ===== GC9A01 驱动 =====
CONFIG_GC9X01X=y

# ===== LVGL =====
CONFIG_LVGL=y
CONFIG_LV_Z_MEM_POOL_SIZE=116736
CONFIG_SYS_HEAP_RUNTIME_STATS=y


# ===== 日志 =====
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3
